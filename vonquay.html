<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  GOOGLE APPS SCRIPT SETUP                                    ║
  ║  ─────────────────────────────────────────────────────────── ║
  ║  1. Mở Google Sheet → Extensions → Apps Script              ║
  ║  2. Xoá code cũ, paste code bên dưới vào:                   ║
  ║                                                              ║
  ║  function doPost(e) {                                        ║
  ║    try {                                                      ║
  ║      var sheet = SpreadsheetApp.getActiveSpreadsheet()       ║
  ║                    .getActiveSheet();                         ║
  ║      if (sheet.getLastRow() === 0) {                         ║
  ║        sheet.appendRow(['Thời gian','Tên bé',                ║
  ║          'Tên phụ huynh','Số điện thoại','Phần thưởng']);    ║
  ║      }                                                        ║
  ║      sheet.appendRow([                                        ║
  ║        new Date().toLocaleString('vi-VN',                    ║
  ║          {timeZone:'Asia/Ho_Chi_Minh'}),                     ║
  ║        e.parameter.tenBe  || '',                             ║
  ║        e.parameter.tenPH  || '',                             ║
  ║        e.parameter.sdt    || '',                             ║
  ║        e.parameter.prize  || ''                              ║
  ║      ]);                                                      ║
  ║      return ContentService                                    ║
  ║        .createTextOutput(JSON.stringify({ok:true}))          ║
  ║        .setMimeType(ContentService.MimeType.JSON);           ║
  ║    } catch(err) {                                             ║
  ║      return ContentService                                    ║
  ║        .createTextOutput(JSON.stringify({ok:false}))         ║
  ║        .setMimeType(ContentService.MimeType.JSON);           ║
  ║    }                                                          ║
  ║  }                                                            ║
  ║                                                              ║
  ║  3. Deploy → New deployment → Web app                        ║
  ║     Execute as: Me                                           ║
  ║     Who has access: Anyone                                   ║

  ╚══════════════════════════════════════════════════════════════╝
-->
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vòng Quay May Mắn</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Segoe UI',Tahoma,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px; color:#fff; user-select:none; overflow-x:hidden;
}
h1 {
  font-size:clamp(1.4rem,5vw,2.4rem); font-weight:900;
  background:linear-gradient(90deg,#ffd700,#ff9d00,#ffd700);
  background-size:200% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmer 3s linear infinite;
  margin-bottom:6px; text-align:center;
}
@keyframes shimmer { to { background-position:200% center; } }
.sub { color:rgba(255,255,255,0.5); font-size:.9rem; margin-bottom:28px; }
.wrapper { position:relative; }
.arrow-wrap {
  position:absolute; top:-14px; left:50%;
  transform:translateX(-50%); z-index:10;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,0.7));
  animation:arrow-bounce 1.8s ease-in-out infinite;
}
@keyframes arrow-bounce {
  0%,100% { transform:translateX(-50%) translateY(0); }
  50%      { transform:translateX(-50%) translateY(-5px); }
}
canvas#wc { display:block; border-radius:50%; box-shadow:0 25px 70px rgba(0,0,0,0.65); }
.spin-btn {
  margin-top:28px; padding:15px 58px;
  font-size:1.2rem; font-weight:800;
  background:linear-gradient(135deg,#f7971e,#ffd200);
  color:#111; border:none; border-radius:50px; cursor:pointer;
  box-shadow:0 6px 28px rgba(255,210,0,0.45);
  transition:transform .2s, box-shadow .2s;
  letter-spacing:1px; text-transform:uppercase;
  animation:pulse-btn 2s ease-in-out infinite;
}
@keyframes pulse-btn {
  0%,100% { box-shadow:0 6px 28px rgba(255,210,0,0.4); }
  50%      { box-shadow:0 6px 50px rgba(255,210,0,0.8), 0 0 0 8px rgba(255,210,0,0.15); }
}
.spin-btn:hover:not(:disabled) { transform:translateY(-3px); animation:none; box-shadow:0 14px 38px rgba(255,210,0,0.7); }
.spin-btn:active:not(:disabled) { transform:translateY(0); }
.spin-btn:disabled { opacity:.45; cursor:default; animation:none; }

/* ── Result overlay ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:999; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
.overlay.on { display:flex; }
.card { background:#fff; border-radius:24px; padding:42px 38px 36px; text-align:center; max-width:360px; width:90%; color:#111; animation:pop .5s cubic-bezier(.175,.885,.32,1.3) both; box-shadow:0 30px 90px rgba(0,0,0,.6); }
@keyframes pop { from{transform:scale(.2) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }
.card-em { font-size:4rem; line-height:1; animation:em-pop .6s cubic-bezier(.175,.885,.32,1.5) both .3s; }
@keyframes em-pop { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }
.card-lbl { font-size:.8rem; color:#999; text-transform:uppercase; letter-spacing:2px; margin:14px 0 6px; }
.card-prize { font-size:2.1rem; font-weight:900; background:linear-gradient(135deg,#6b21a8,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:18px; animation:slide-up .4s ease both .15s; }
.voucher { display:inline-flex; align-items:center; gap:7px; background:#fef9e7; border:2px dashed #e6ac00; border-radius:12px; padding:10px 20px; color:#854d0e; font-size:.9rem; font-weight:700; margin-bottom:24px; animation:slide-up .4s ease both .25s; }
.again-btn { width:100%; padding:14px; background:linear-gradient(135deg,#7c3aed,#a855f7); color:#fff; border:none; border-radius:14px; font-size:1rem; font-weight:700; cursor:pointer; transition:opacity .2s,transform .15s; animation:slide-up .4s ease both .35s; }
.again-btn:hover { opacity:.88; transform:scale(1.02); }
@keyframes slide-up { from{transform:translateY(18px);opacity:0} to{transform:translateY(0);opacity:1} }

/* ── FORM SCREEN ── */
#formScreen {
  position:fixed; inset:0; z-index:800;
  background:linear-gradient(135deg,rgba(15,12,41,.96),rgba(48,43,99,.96),rgba(36,36,62,.96));
  backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  transition:opacity .5s ease, transform .5s ease;
}
#formScreen.hiding { opacity:0; transform:translateY(-30px); pointer-events:none; }

.fcard {
  background:linear-gradient(145deg,#1e1b4b,#2d1a5e);
  border:1px solid rgba(168,85,247,.35);
  border-radius:24px; padding:38px 36px;
  max-width:460px; width:100%;
  box-shadow:0 0 0 1px rgba(168,85,247,.15), 0 30px 80px rgba(0,0,0,.7);
  animation:pop .5s cubic-bezier(.175,.885,.32,1.2) both;
}
.fcard-title {
  text-align:center; font-size:1.4rem; font-weight:900;
  background:linear-gradient(90deg,#ffd700,#ff9d00);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:6px;
}
.fcard-sub { text-align:center; font-size:.85rem; color:rgba(255,255,255,.5); margin-bottom:28px; }

.fgroup { margin-bottom:18px; }
.fgroup label {
  display:block; font-size:.85rem; font-weight:600;
  color:rgba(255,255,255,.75); margin-bottom:7px; letter-spacing:.3px;
}
.fgroup input {
  width:100%; padding:13px 16px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.15);
  border-radius:12px; color:#fff; font-size:1rem;
  font-family:inherit; outline:none;
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.fgroup input::placeholder { color:rgba(255,255,255,.3); }
.fgroup input:focus {
  border-color:rgba(168,85,247,.7);
  background:rgba(168,85,247,.1);
  box-shadow:0 0 0 3px rgba(168,85,247,.2);
}
.fgroup input.err { border-color:#f87171; box-shadow:0 0 0 3px rgba(248,113,113,.2); }
.ferr { font-size:.78rem; color:#f87171; margin-top:5px; min-height:18px; display:block; }

.fsubmit-btn {
  width:100%; margin-top:8px; padding:16px;
  font-size:1.15rem; font-weight:800;
  background:linear-gradient(135deg,#f7971e,#ffd200);
  color:#111; border:none; border-radius:14px; cursor:pointer;
  box-shadow:0 6px 28px rgba(255,210,0,.4);
  transition:transform .2s, box-shadow .2s;
  letter-spacing:1px; text-transform:uppercase;
}
.fsubmit-btn:hover { transform:translateY(-2px); box-shadow:0 10px 35px rgba(255,210,0,.6); }
.fsubmit-btn:active { transform:translateY(0); }

/* ── Toast ── */
#toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
  background:rgba(30,27,75,.95); border:1px solid rgba(168,85,247,.4);
  color:#fff; padding:12px 24px; border-radius:50px;
  font-size:.9rem; font-weight:600;
  transition:transform .4s ease, opacity .4s ease;
  opacity:0; z-index:1200; white-space:nowrap;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>

<!-- ── FORM SCREEN ── -->
<div id="formScreen">
  <div class="fcard">
    <div class="fcard-title">🎠 Tham Gia Quay Thưởng!</div>
    <div class="fcard-sub">Điền thông tin bên dưới để bắt đầu 🎁</div>

    <div class="fgroup">
      <label>👶 Tên bé</label>
      <input type="text" id="fTenBe" placeholder="Nhập tên bé..." autocomplete="off">
      <span class="ferr" id="eTenBe"></span>
    </div>
    <div class="fgroup">
      <label>👨‍👩‍👦 Tên phụ huynh</label>
      <input type="text" id="fTenPH" placeholder="Nhập tên phụ huynh..." autocomplete="off">
      <span class="ferr" id="eTenPH"></span>
    </div>
    <div class="fgroup">
      <label>📱 Số điện thoại</label>
      <input type="tel" id="fSdt" placeholder="0xxxxxxxxx" maxlength="11" autocomplete="off">
      <span class="ferr" id="eSdt"></span>
    </div>

    <button class="fsubmit-btn" onclick="submitForm()">🎡 Bắt đầu quay!</button>
  </div>
</div>

<!-- ── WHEEL ── -->
<h1>🎡 VÒNG QUAY MAY MẮN</h1>
<p class="sub">Quay để nhận phần thưởng!</p>

<div class="wrapper">
  <div class="arrow-wrap">
    <svg width="34" height="42" viewBox="0 0 34 42">
      <defs>
        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff3030"/>
          <stop offset="100%" stop-color="#8b0000"/>
        </linearGradient>
      </defs>
      <polygon points="17,0 34,42 0,42" fill="url(#ag)"/>
      <polygon points="17,6 28,40 6,40" fill="#ff7070" opacity=".55"/>
    </svg>
  </div>
  <canvas id="wc" width="580" height="580"></canvas>
</div>

<button class="spin-btn" id="btn" disabled>🎰 QUAY NGAY!</button>

<!-- ── RESULT ── -->
<div class="overlay" id="ol" onclick="closeResult()">
  <div class="card" onclick="event.stopPropagation()">
    <div class="card-em" id="ce">🎉</div>
    <div class="card-lbl">Chúc mừng! Bạn trúng</div>
    <div class="card-prize" id="cp">...</div>
    <div class="voucher">🎫 Voucher (luôn kèm theo)</div>
    <button class="again-btn" onclick="closeResult()">Hoàn thành 🎉</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   ⚙️  CẤU HÌNH — paste URL Apps Script vào đây
══════════════════════════════════════════════ */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVQUW4dEWh_o2bfJq9WxiBZpXHpudc8LLFqGX4XNriOzsLg5AZwubOVvh4VHfdlGilSg/exec';

/* ══════════════════════════════════════════════
   FORM
══════════════════════════════════════════════ */
let playerData = null;

function submitForm() {
  const tenBe = document.getElementById('fTenBe').value.trim();
  const tenPH = document.getElementById('fTenPH').value.trim();
  const sdt   = document.getElementById('fSdt').value.trim();
  let ok = true;

  // Clear errors
  ['fTenBe','fTenPH','fSdt'].forEach(id => {
    document.getElementById(id).classList.remove('err');
  });
  ['eTenBe','eTenPH','eSdt'].forEach(id => {
    document.getElementById(id).textContent = '';
  });

  if (tenBe.length < 2) {
    document.getElementById('fTenBe').classList.add('err');
    document.getElementById('eTenBe').textContent = 'Vui lòng nhập tên bé (ít nhất 2 ký tự)';
    ok = false;
  }
  if (tenPH.length < 2) {
    document.getElementById('fTenPH').classList.add('err');
    document.getElementById('eTenPH').textContent = 'Vui lòng nhập tên phụ huynh (ít nhất 2 ký tự)';
    ok = false;
  }
  if (!/^0\d{9,10}$/.test(sdt)) {
    document.getElementById('fSdt').classList.add('err');
    document.getElementById('eSdt').textContent = 'Số điện thoại không hợp lệ (bắt đầu bằng 0, 10–11 số)';
    ok = false;
  }
  if (!ok) return;

  playerData = { tenBe, tenPH, sdt };

  // Animate form out
  const fs = document.getElementById('formScreen');
  fs.classList.add('hiding');
  setTimeout(() => { fs.style.display = 'none'; }, 500);

  // Enable spin button
  document.getElementById('btn').disabled = false;
  requestAnimationFrame(idleLoop);
}

// Allow Enter key to submit form
document.addEventListener('keydown', e => {
  if (e.code === 'Enter' && document.getElementById('formScreen').style.display !== 'none') {
    if (!document.getElementById('formScreen').classList.contains('hiding')) {
      submitForm();
    }
  }
});

/* ══════════════════════════════════════════════
   GOOGLE SHEETS
══════════════════════════════════════════════ */
function sendToSheet(prize) {
  if (!playerData || !SCRIPT_URL || SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  const body = new URLSearchParams({
    tenBe : playerData.tenBe,
    tenPH : playerData.tenPH,
    sdt   : playerData.sdt,
    prize : prize
  });
  fetch(SCRIPT_URL, {
    method : 'POST',
    mode   : 'no-cors',
    headers: { 'Content-Type':'application/x-www-form-urlencoded' },
    body   : body.toString()
  }).catch(() => {});
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ══════════════════════════════════════════════
   WHEEL ENGINE
══════════════════════════════════════════════ */
(function () {
const cv  = document.getElementById('wc');
const ctx = cv.getContext('2d');
const W   = cv.width;
const cx  = W/2, cy = W/2;
const R   = 224;
const RL  = 242;
const RO  = 257;

const items = [
  { label:'Sticker',   p:.70, bg:'#F5D76E', dk:'#C8950A', fg:'#7A5C00', em:'🎨' },
  { label:'Tranh cát', p:.15, bg:'#E8C9A0', dk:'#B8895A', fg:'#6B4423', em:'🖼️'  },
  { label:'Lắp ghép', p:.10, bg:'#C5B8D8', dk:'#8A74B5', fg:'#4A3370', em:'🧩' },
  { label:'Lego Mini', p:.05, bg:'#B8CDE8', dk:'#5A8AB5', fg:'#1A4D73', em:'🧱' },
];
const equalSw = Math.PI*2 / items.length;
let cum = -Math.PI/2;
items.forEach(it => { it.s=cum; it.sw=equalSw; it.mid=cum+equalSw/2; cum+=equalSw; });

/* ── Audio ── */
let ac = null;
const getAC = () => {
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
  if (ac.state==='suspended') ac.resume();
  return ac;
};
function playTick(spd) {
  try {
    const a=getAC(),t=a.currentTime,osc=a.createOscillator(),g=a.createGain();
    osc.connect(g);g.connect(a.destination);osc.type='triangle';
    const f=280+spd*920;
    osc.frequency.setValueAtTime(f,t);
    osc.frequency.exponentialRampToValueAtTime(f*.45,t+.055);
    g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);
    osc.start(t);osc.stop(t+.07);
  }catch(e){}
}
function playWhoosh() {
  try {
    const a=getAC(),t=a.currentTime,len=a.sampleRate*.3;
    const buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5);
    const src=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();
    f.type='bandpass';f.frequency.setValueAtTime(3500,t);f.frequency.exponentialRampToValueAtTime(180,t+.3);f.Q.value=.4;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(a.destination);
    g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
    src.start(t);src.stop(t+.3);
  }catch(e){}
}
function playFanfare() {
  try {
    const a=getAC(),t=a.currentTime;
    [[523.25,0],[659.25,.13],[783.99,.26],[1046.5,.39],[1318.5,.54],[1046.5,.54],[783.99,.54]].forEach(([f,dt])=>{
      const osc=a.createOscillator(),g=a.createGain(),T=t+dt;
      osc.connect(g);g.connect(a.destination);osc.type='sine';osc.frequency.setValueAtTime(f,T);
      g.gain.setValueAtTime(0,T);g.gain.linearRampToValueAtTime(.22,T+.02);
      g.gain.setValueAtTime(.22,T+.25);g.gain.exponentialRampToValueAtTime(.001,T+.6);
      osc.start(T);osc.stop(T+.6);
    });
    const kick=a.createOscillator(),kg=a.createGain();
    kick.connect(kg);kg.connect(a.destination);kick.type='sine';
    kick.frequency.setValueAtTime(160,t);kick.frequency.exponentialRampToValueAtTime(30,t+.18);
    kg.gain.setValueAtTime(.7,t);kg.gain.exponentialRampToValueAtTime(.001,t+.22);
    kick.start(t);kick.stop(t+.22);
  }catch(e){}
}

/* ── Sparks ── */
let sparks=[];
function addSparks(n){
  for(let i=0;i<n;i++) sparks.push({
    x:cx+(Math.random()-.5)*18, y:cy-R+10,
    vx:(Math.random()-.5)*4, vy:-(Math.random()*2.5+.5),
    life:1, decay:.055+Math.random()*.045,
    r:Math.random()*3+1, hue:25+Math.random()*45
  });
}
function drawSparks(){
  sparks=sparks.filter(s=>s.life>0);
  sparks.forEach(s=>{
    s.x+=s.vx;s.y+=s.vy;s.vy+=.13;s.life-=s.decay;
    ctx.save();ctx.globalAlpha=Math.max(0,s.life);
    ctx.shadowBlur=10;ctx.shadowColor=`hsl(${s.hue},100%,60%)`;
    ctx.fillStyle=`hsl(${s.hue},100%,68%)`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}

/* ── Confetti ── */
const CC=document.createElement('canvas');
CC.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:1100;';
document.body.appendChild(CC);
const cc=CC.getContext('2d');
const rsz=()=>{CC.width=innerWidth;CC.height=innerHeight;};
rsz();window.addEventListener('resize',rsz);
const COLS=['#f94144','#f3722c','#f8961e','#f9c74f','#90be6d','#43aa8b','#a855f7','#ec4899','#06b6d4','#fff','#ffd700'];
class Confetto{reset(){
  this.x=Math.random()*CC.width;this.y=-(Math.random()*250+10);
  this.c=COLS[0|Math.random()*COLS.length];
  this.w=Math.random()*11+5;this.h=Math.random()*5+3;
  this.vx=(Math.random()-.5)*5;this.vy=Math.random()*5+2;
  this.a=Math.random()*Math.PI*2;this.sp=(Math.random()-.5)*.2;this.op=1;
}tick(){
  this.x+=this.vx;this.y+=this.vy;this.a+=this.sp;this.vy+=.07;
  if(this.y>CC.height+20)this.op=0;
  cc.save();cc.globalAlpha=this.op;cc.translate(this.x,this.y);cc.rotate(this.a);
  cc.fillStyle=this.c;cc.fillRect(-this.w/2,-this.h/2,this.w,this.h);cc.restore();
}}
let pieces=[];
function launchConfetti(){
  pieces=Array.from({length:160},()=>{const c=new Confetto();c.reset();return c;});
  (function loop(){
    cc.clearRect(0,0,CC.width,CC.height);
    pieces=pieces.filter(p=>p.op>0);
    pieces.forEach(p=>p.tick());
    if(pieces.length) requestAnimationFrame(loop);
  })();
}

/* ── Draw ── */
let rot=0,busy=false,isSpinning=false;
function drawLights(){
  const N=24,now=Date.now(),rate=isSpinning?65:550;
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2,lx=cx+Math.cos(a)*RL,ly=cy+Math.sin(a)*RL;
    const lit=((0|now/rate)+i%2)%2===0;
    const g=ctx.createRadialGradient(lx-3,ly-3,0,lx,ly,9);
    if(lit){
      g.addColorStop(0,'#fff');g.addColorStop(.35,'#ffe566');g.addColorStop(1,'#ff7700');
      ctx.shadowBlur=16;ctx.shadowColor='rgba(255,215,0,.9)';
    }else{
      g.addColorStop(0,'#443300');g.addColorStop(1,'#1a1000');ctx.shadowBlur=0;
    }
    ctx.beginPath();ctx.arc(lx,ly,9,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.shadowBlur=0;
  }
}
function draw(r){
  ctx.clearRect(0,0,W,W);
  if(isSpinning){
    ctx.save();ctx.shadowBlur=40;ctx.shadowColor='rgba(255,200,0,.75)';
    ctx.beginPath();ctx.arc(cx,cy,RO+2,0,Math.PI*2);ctx.fillStyle='rgba(255,200,0,.01)';ctx.fill();ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,RO,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,RO,0,Math.PI*2);ctx.strokeStyle='#c8950a';ctx.lineWidth=3;ctx.stroke();
  items.forEach(it=>{
    const sa=it.s+r,ea=sa+it.sw,ma=it.mid+r;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,sa,ea);ctx.closePath();
    const gx=cx+Math.cos(ma)*R*.5,gy=cy+Math.sin(ma)*R*.5;
    const gr=ctx.createRadialGradient(gx,gy,0,cx,cy,R);
    gr.addColorStop(0,it.bg);gr.addColorStop(.82,it.bg);gr.addColorStop(1,it.dk);
    ctx.fillStyle=gr;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.88)';ctx.lineWidth=2;ctx.stroke();
    // Horizontal label
    const tx=cx+Math.cos(ma)*R*.58,ty=cy+Math.sin(ma)*R*.58;
    ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.25)';ctx.shadowBlur=4;ctx.fillStyle=it.fg;
    ctx.font='28px serif';ctx.fillText(it.em,tx,ty-17);
    ctx.font='bold 17px Segoe UI';ctx.fillText(it.label,tx,ty+8);
    ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,R+3,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=3;ctx.stroke();
  drawLights();
  drawSparks();
  ctx.save();
  const hg=ctx.createRadialGradient(cx-5,cy-5,0,cx,cy,40);
  hg.addColorStop(0,'#d8b4fe');hg.addColorStop(1,'#6b21a8');
  ctx.beginPath();ctx.arc(cx,cy,40,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('★',cx,cy);ctx.restore();
}

/* ── Idle ── */
window.idleLoop = function idleLoop(){
  if(busy) return;
  rot+=.003; draw(rot);
  requestAnimationFrame(idleLoop);
};

/* ── Spin ── */
function pick(){
  let rnd=Math.random(),acc=0;
  for(const it of items){acc+=it.p;if(rnd<=acc)return it;}
  return items[0];
}
const ease=t=>1-Math.pow(1-t,4);

function spin(){
  if(busy) return;
  busy=true;isSpinning=true;
  document.getElementById('btn').disabled=true;
  playWhoosh();
  const winner=pick();
  const curN=((rot%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  let tgtN=((-Math.PI/2-winner.mid)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  tgtN=((tgtN+(Math.random()-.5)*winner.sw*.45)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  let delta=tgtN-curN;if(delta<0)delta+=Math.PI*2;
  const extra=(5+Math.floor(Math.random()*3))*Math.PI*2;
  const endRot=rot+delta+extra,startRot=rot;
  const dur=4500+Math.random()*1200,t0=performance.now();
  let lastSeg=Math.floor(rot/equalSw);
  (function frame(now){
    const t=Math.min((now-t0)/dur,1),spd=Math.pow(1-t,3);
    rot=startRot+(endRot-startRot)*ease(t);draw(rot);
    const seg=Math.floor(rot/equalSw);
    if(seg>lastSeg){playTick(spd);lastSeg=seg;}
    if(spd>.02&&Math.random()<.6) addSparks(1+Math.ceil(spd*2));
    if(t<1){
      requestAnimationFrame(frame);
    }else{
      rot=endRot;isSpinning=false;busy=false;
      setTimeout(()=>{
        document.getElementById('ce').textContent=winner.em;
        document.getElementById('cp').textContent=winner.label;
        document.getElementById('ol').classList.add('on');
        playFanfare();launchConfetti();
        sendToSheet(winner.label);          // ← ghi vào Sheet
        requestAnimationFrame(window.idleLoop);
      },350);
    }
  })(t0);
}

function closeResult(){
  document.getElementById('ol').classList.remove('on');

  // Reset về form ban đầu
  playerData = null;
  document.getElementById('fTenBe').value = '';
  document.getElementById('fTenPH').value = '';
  document.getElementById('fSdt').value   = '';
  ['fTenBe','fTenPH','fSdt'].forEach(id => document.getElementById(id).classList.remove('err'));
  ['eTenBe','eTenPH','eSdt'].forEach(id => document.getElementById(id).textContent = '');

  // Disable spin button
  document.getElementById('btn').disabled = true;

  // Hiện lại form với animation
  const fs = document.getElementById('formScreen');
  fs.style.display = 'flex';
  // Force reflow để animation chạy lại
  fs.classList.remove('hiding');
  void fs.offsetWidth;
  fs.style.animation = 'none';
  void fs.offsetWidth;
  fs.style.animation = '';
  fs.querySelector('.fcard').style.animation = 'none';
  void fs.querySelector('.fcard').offsetWidth;
  fs.querySelector('.fcard').style.animation = 'pop .5s cubic-bezier(.175,.885,.32,1.2) both';
}

document.getElementById('btn').addEventListener('click',spin);
document.addEventListener('keydown',e=>{
  if((e.code==='Space'||e.code==='Enter')&&!busy&&
     document.getElementById('formScreen').style.display==='none'){
    e.preventDefault();spin();
  }
});
window.closeResult=closeResult;
draw(0);
// idleLoop starts after form submit
})();
</script>
